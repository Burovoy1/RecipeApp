name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. .NET 8 ────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── 3. MAUI Android workload ──────────────────────────────────────
      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      # ── 4. Restore ───────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore RecipeApp.csproj -p:TargetFramework=net8.0-android

      # ── 5a. Debug build (every push) ─────────────────────────────────
      - name: Build Debug APK
        if: github.event_name != 'release'
        run: |
          dotnet build RecipeApp.csproj \
            -f net8.0-android \
            -c Debug \
            -p:AndroidPackageFormat=apk

      # ── 5b. Release build with signing (on GitHub Release only) ──────
      - name: Build Release APK (signed)
        if: github.event_name == 'release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_ALIAS:  ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASS:   ${{ secrets.KEYSTORE_PASS }}
          KEY_PASS:        ${{ secrets.KEY_PASS }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > recipeapp.keystore

          dotnet publish RecipeApp.csproj \
            -f net8.0-android \
            -c Release \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$(pwd)/recipeapp.keystore" \
            -p:AndroidSigningKeyAlias="$KEYSTORE_ALIAS" \
            -p:AndroidSigningKeyPass="$KEY_PASS" \
            -p:AndroidSigningStorePass="$KEYSTORE_PASS"

          rm -f recipeapp.keystore

      # ── 6. Find APK ───────────────────────────────────────────────────
      - name: Locate APK
        run: find . -name "*.apk" -not -path "*/obj/*" | tee apk_paths.txt

      # ── 7. Upload artifact ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RecipeApp-${{ github.event_name == 'release' && 'release' || 'debug' }}-apk
          path: |
            bin/Debug/net8.0-android/*.apk
            bin/Release/net8.0-android/publish/*.apk
          if-no-files-found: warn
          retention-days: 14

      # ── 8. Attach APK to GitHub Release ───────────────────────────────
      - name: Upload APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/net8.0-android/publish/*.apk
